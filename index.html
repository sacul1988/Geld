<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tagesbudget-Rechner</title>
    <link rel="stylesheet" href="style.css">
    <!-- Apple Mobile Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budget">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tagesbudget</h1>
            <p id="current-date"></p>
        </header>

        <main>
            <section class="input-group">
                <label for="budget-input">Verfügbarer Betrag (€)</label>
                <input type="number" id="budget-input" pattern="\d*" placeholder="0.00" step="0.01">
                <button id="calculate-btn">Berechnen</button>
                <button id="start-saving-btn" style="margin-top: 10px; background-color: #34c759; width: 100%;">Sparen</button>
                <div style="display: flex; gap: 10px; width: 100%; margin-top: 10px;">
                    <button id="show-history-btn" style="flex: 1; background-color: #8e8e93; font-size: 14px; padding: 10px;">Verlauf</button>
                    <button id="reset-btn" style="flex: 1; background-color: #ff3b30; font-size: 14px; padding: 10px;">Reset</button>
                </div>
            </section>

            <section class="results">
                <div class="result-card highlight">
                    <span class="label">Budget pro Tag</span>
                    <span id="daily-budget" class="value">€ 0.00</span>
                </div>
                <div id="savings-display" class="result-card" style="display: none; border: 2px solid #34c759;">
                    <span class="label">Aktuelles Spar-Budget</span>
                    <span id="accumulated-budget" class="value">€ 0.00</span>
                    <span id="daily-savings-rate" style="font-size: 14px; font-weight: 600; color: #34c759; margin-top: 2px;">(+ € 0.00 / Tag)</span>
                    <p id="savings-start-info" style="font-size: 11px; color: var(--secondary-text); margin-top: 5px;">Gespart seit Start</p>
                </div>
            </section>

            <!-- Verlauf Modal/Overlay -->
            <div id="history-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px;">
                <div style="background: white; width: 100%; max-width: 350px; border-radius: 12px; padding: 20px; max-height: 80vh; overflow-y: auto;">
                    <h2 style="margin-top: 0;">Verlauf</h2>
                    <ul id="history-list" style="list-style: none; padding: 0;"></ul>
                    <button id="close-history-btn" style="width: 100%; margin-top: 20px;">Schließen</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
