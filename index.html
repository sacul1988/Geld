<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tagesbudget-Rechner</title>
    <link rel="stylesheet" href="style.css">
    <!-- Apple Mobile Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budget">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tagesbudget</h1>
            <p id="current-date"></p>
        </header>

        <main>
            <section class="input-group">
                <label for="budget-input">Verfügbarer Betrag (€)</label>
                <input type="number" id="budget-input" pattern="\d*" placeholder="0.00" step="0.01">
                <button id="calculate-btn">Berechnen & Speichern</button>
            </section>

            <section class="results">
                <div class="result-card">
                    <span class="label">Tage bis Monatsende</span>
                    <span id="days-remaining" class="value">-</span>
                </div>
                <div class="result-card highlight">
                    <span class="label">Budget pro Tag</span>
                    <span id="daily-budget" class="value">€ 0.00</span>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
